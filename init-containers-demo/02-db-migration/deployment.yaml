apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      # ─────────────────────────────────────────────
      # INIT CONTAINERS
      # ─────────────────────────────────────────────
      initContainers:
        # Stage 1: wait for database to be reachable
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                echo "Postgres not ready, retrying..."
                sleep 2
              done
              echo "PostgreSQL is reachable ✅"

        # Stage 2: run database migrations (idempotent!)
        # Uses the golang-migrate CLI image
        - name: run-db-migration
          image: migrate/migrate:v4.17.0
          args:
            - "-path=/migrations"          # path to migration files
            - "-database"
            - "$(DATABASE_URL)"
            - "up"                         # run all pending migrations
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials    # kubectl create secret generic db-credentials --from-literal=url=...
                  key: url
          volumeMounts:
            - name: migrations-vol
              mountPath: /migrations      # migration SQL files are mounted here

      # ─────────────────────────────────────────────
      # APP CONTAINERS — start only after migrations done
      # ─────────────────────────────────────────────
      containers:
        - name: api-server
          image: myapi:v2.1              # replace with your image
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      # ─────────────────────────────────────────────
      # VOLUMES
      # ─────────────────────────────────────────────
      volumes:
        - name: migrations-vol
          configMap:
            name: db-migrations          # see configmap.yaml
